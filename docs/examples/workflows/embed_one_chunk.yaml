# Sub-workflow: embed one text chunk and store in the org_knowledge_base collection.
#
# Called by embed_and_store.yaml via:
#   type: workflow
#   foreach: text_chunks
#   config:
#     name: embed_one_chunk
#
# When called from a foreach loop, _item is the current chunk string.
#
# Dependencies: pip install 'solux[vector]'

name: embed_one_chunk
description: "Embed a single text chunk (_item) and upsert into ChromaDB (org_knowledge_base)"

steps:
  - name: embed_chunk
    type: ai.embeddings
    config:
      input_key: _item
      output_key: embedding

  - name: store_chunk
    type: output.vector_store
    config:
      collection: org_knowledge_base
      text_key: _item
      embedding_key: embedding
