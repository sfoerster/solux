# Use Case 6 — Distributed Pipeline: Node A (ingestion node)
#
# Runs on a lightweight machine (NAS, home server, low-power desktop).
# Watches a local folder for new PDF files, extracts and cleans the text,
# and forwards it as a string payload to a GPU-equipped Node B for
# embedding and vector storage.
#
# Node B must be running `solus serve` and have the `embed_and_store`
# workflow deployed in its own workflows.d/ directory.
#
# Required environment variables (set in ~/.config/solus/.env on Node A):
#   GPU_NODE_URL    — e.g. http://192.168.1.50:8765
#   GPU_NODE_TOKEN  — Bearer token configured on Node B (leave blank if none)
#
# Trigger: see triggers.d/watch_incoming_pdfs.yaml
# Manual run: solus run --workflow ingest_and_forward /path/to/document.pdf
#
# Dependencies: pip install 'solus[pdf]'

name: ingest_and_forward
description: "Extract and clean a PDF, then forward cleaned text to the GPU embedding node"

steps:
  - name: extract_text
    type: input.parse_pdf
    config:
      output_key: pdf_text

  - name: clean_text
    type: transform.text_clean
    config:
      input_key: pdf_text
      normalize_whitespace: true
      max_chars: 100000
      output_key: cleaned_text

  - name: forward_to_gpu_node
    type: output.vinsium_node
    config:
      node_url: "${env:GPU_NODE_URL}"
      auth_token: "${env:GPU_NODE_TOKEN}"
      workflow_name: embed_and_store
      input_key: cleaned_text     # Sends cleaned_text as the "text" field
      verify_ssl: false           # Set to true if Node B uses a trusted TLS cert
