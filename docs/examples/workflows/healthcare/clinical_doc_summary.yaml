name: clinical_doc_summary
description: >
  Summarize clinical documents (discharge notes, radiology reports, lab results).
  Extracts key entities, classifies document type, and produces a structured summary.
  All processing runs locally — no data leaves the network.

meta:
  manual_estimate_minutes: 30
  manual_estimate_label: "Manual clinical summary"

steps:
  - name: ingest_document
    type: input.parse_pdf
    config:
      output_key: raw_text

  - name: clean_text
    type: transform.text_clean
    config:
      input_key: raw_text
      output_key: cleaned_text

  - name: classify_document
    type: ai.llm_classify
    config:
      input_key: cleaned_text
      output_key: doc_type
      categories:
        - discharge_summary
        - radiology_report
        - lab_result
        - progress_note
        - other
      system_prompt: >
        You are a Health Information Management (HIM) department classifier.
        Classify the document into exactly one of the provided categories
        based on its content, structure, and medical terminology.

        Return ONLY the category label — no explanation, no punctuation,
        no extra text.

  - name: summarize
    type: ai.llm_summarize
    config:
      input_key: cleaned_text
      output_key: summary
      mode: full
      system_prompt: >
        You are a clinical documentation specialist. Produce a structured
        summary in this exact format:

        ASSESSMENT: One-sentence clinical assessment.

        KEY FINDINGS: Bullet the 3-5 most important clinical findings.

        MEDICATIONS: List current medications with dosages.

        FOLLOW-UP: List required follow-up actions with timeframes.

        Keep the total summary under 150 words. Use professional medical
        language. Preserve all clinically relevant details including
        diagnoses, ICD-10 codes, abnormal values, and treatment plans.

  - name: extract_entities
    type: ai.llm_extract
    config:
      input_key: cleaned_text
      output_key: entities
      prompt_template: |
        Extract key clinical entities from this document. Return a JSON object
        with exactly this schema — no markdown fences, no extra text:

        {
          "diagnoses": [{"name": "...", "icd10": "..."}],
          "medications": [{"name": "...", "dosage": "...", "frequency": "..."}],
          "procedures": [{"name": "...", "date": "..."}],
          "follow_up": [{"action": "...", "timeframe": "..."}],
          "allergies": ["..."],
          "vitals": [{"name": "...", "value": "...", "unit": "..."}],
          "phi_detected": true or false
        }

        Rules:
        - Use null for missing fields, never omit keys
        - Set phi_detected to true if ANY patient identifiers (name, DOB, SSN,
          MRN, address) appear in the document, but DO NOT include their values
        - Return valid JSON only — no markdown, no code fences, no explanation

        Document:
        {cleaned_text}

  - name: write_summary
    type: output.file_write
    config:
      input_key: summary
      filename: summary-clinical.md

  - name: store_result
    type: output.local_db
    config:
      table: clinical_docs
      input_key: summary
