name: clinical_doc_triage
description: >
  Triage incoming clinical documents: classify type and urgency, summarize,
  and extract structured entities (diagnoses, medications, procedures,
  follow-ups, allergies). All processing runs locally — no data leaves
  the network.

meta:
  manual_estimate_minutes: 45
  manual_estimate_label: "Manual document triage"

steps:
  - name: ingest_document
    type: input.parse_pdf
    config:
      output_key: raw_text

  - name: clean_text
    type: transform.text_clean
    config:
      input_key: raw_text
      output_key: cleaned_text

  - name: classify_doc_type
    type: ai.llm_classify
    config:
      input_key: cleaned_text
      output_key: doc_type
      categories:
        - discharge_summary
        - radiology_report
        - lab_result
        - progress_note
        - referral_letter
        - prescription
      system_prompt: >
        You are a Health Information Management (HIM) department classifier
        processing incoming clinical documents. Your job is to classify the
        document into exactly one of the provided categories based on its
        content, structure, and terminology.

        Return ONLY the category label — no explanation, no punctuation,
        no extra text.

  - name: classify_urgency
    type: ai.llm_classify
    config:
      input_key: cleaned_text
      output_key: urgency
      categories:
        - critical
        - urgent
        - routine
        - informational
      system_prompt: >
        You are a clinical urgency assessor triaging incoming documents.
        Classify the urgency using these explicit criteria:

        CRITICAL — Life-threatening findings requiring immediate action:
        potassium (K+) > 6.5 mEq/L, hemoglobin < 7 g/dL, troponin elevation,
        new malignancy/suspicious mass, acute PE/stroke findings, INR > 5,
        glucose < 40 or > 500 mg/dL, positive blood cultures with sepsis.

        URGENT — Requires clinical action within 24-48 hours:
        abnormal but non-critical lab values, new referrals for symptomatic
        patients, medication changes needed, imaging showing non-emergent
        but significant findings, follow-up needed for worsening symptoms.

        ROUTINE — Stable findings, standard follow-up:
        normal or expected lab results, stable chronic disease monitoring,
        routine follow-up appointments, discharge summaries for stable patients.

        INFORMATIONAL — Administrative or no clinical action needed:
        completed prescriptions, administrative correspondence, records
        requests, informational copies, insurance documents.

        Return ONLY the urgency label — no explanation, no extra text.

  - name: summarize
    type: ai.llm_summarize
    config:
      input_key: cleaned_text
      output_key: summary
      mode: full
      system_prompt: >
        You are a clinical documentation specialist. Produce a structured
        summary in this exact format:

        ASSESSMENT: One-sentence clinical assessment.

        KEY FINDINGS: Bullet the 3-5 most important clinical findings.

        MEDICATIONS: List current medications with dosages.

        FOLLOW-UP: List required follow-up actions with timeframes.

        Keep the total summary under 150 words. Use professional medical
        language. Preserve all clinically relevant details including
        diagnoses, ICD-10 codes, abnormal values, and treatment plans.

  - name: extract_entities
    type: ai.llm_extract
    config:
      input_key: cleaned_text
      output_key: entities
      prompt_template: |
        Extract key clinical entities from this document. Return a JSON object
        with exactly this schema — no markdown fences, no extra text:

        {
          "diagnoses": [{"name": "...", "icd10": "..."}],
          "medications": [{"name": "...", "dosage": "...", "frequency": "..."}],
          "procedures": [{"name": "...", "date": "..."}],
          "follow_up": [{"action": "...", "timeframe": "..."}],
          "allergies": ["..."],
          "phi_detected": true or false
        }

        Rules:
        - Use null for missing fields, never omit keys
        - Set phi_detected to true if ANY patient identifiers (name, DOB, SSN,
          MRN, address) appear in the document, but DO NOT include their values
        - Return valid JSON only — no markdown, no code fences, no explanation

        Document:
        {cleaned_text}

  - name: write_summary
    type: output.file_write
    config:
      input_key: summary
      filename: summary-clinical.md
