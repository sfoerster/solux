name: claims_classification
description: >
  Batch classification of incoming claims documents.
  Monitors an inbox or folder for new documents, classifies each into
  approved/denied/pending/review, stores results, and sends notifications.
  All processing runs locally — no data leaves the network.

meta:
  manual_estimate_minutes: 20
  manual_estimate_label: "Manual claims adjudication"

steps:
  - name: watch_claims
    type: input.folder_watch
    config:
      path: ${env:CLAIMS_WATCH_DIR}
      pattern: "*.pdf"
      output_key: source_path

  - name: extract_text
    type: input.parse_pdf
    config:
      output_key: raw_text

  - name: clean_text
    type: transform.text_clean
    config:
      input_key: raw_text
      output_key: cleaned_text

  - name: classify_claim
    type: ai.llm_classify
    config:
      input_key: cleaned_text
      output_key: claim_status
      categories:
        - approved
        - denied
        - pending_review
        - needs_additional_info
      system_prompt: >
        You are a healthcare claims processing specialist performing
        initial adjudication review. Classify this claim using these criteria:

        APPROVED — All required documentation present, procedure codes match
        diagnosis, medical necessity clearly established, within coverage
        limits, prior authorization on file if required.

        DENIED — Service not covered under plan, exceeds benefit limits,
        documentation shows exclusion criteria, duplicate claim detected,
        provider not in network without OON authorization.

        PENDING_REVIEW — Documentation is present but ambiguous, medical
        necessity arguable, requires clinical reviewer sign-off, complex
        case with multiple comorbidities affecting coverage determination.

        NEEDS_ADDITIONAL_INFO — Missing required fields (date of service,
        diagnosis codes, procedure codes, provider NPI), incomplete
        clinical documentation, missing prior authorization number,
        illegible or partial records.

        Return ONLY the category label — no explanation, no extra text.

  - name: store_result
    type: output.local_db
    config:
      table: claims_results
      input_key: claim_status
