# Use Case 3 — Watch Downloads folder for new PDF files
#
# Solux polls ~/Downloads every 15 seconds for new .pdf files.
# Each new file is queued for the pdf_to_obsidian workflow.
#
# Adjust `path` if your PDFs land somewhere other than ~/Downloads.
# If you only want to watch a specific subfolder (e.g. ~/Downloads/Papers),
# change the path accordingly.

name: watch_pdfs
enabled: false
type: folder_watch
workflow: pdf_to_obsidian
config:
  path: ~/Downloads
  pattern: "*.pdf"
  interval: 15
