services:
  ollama:
    image: ollama/ollama:0.12.0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  server:
    build: .
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ${SOLUX_CONFIG_MOUNT:-solux_config}:/home/solux/.config/solux
      - ${SOLUX_DATA_MOUNT:-solux_data}:/home/solux/.local/share/solux
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  worker:
    build: .
    command: ["solux", "worker", "start", "--_run-loop", "--workers", "2"]
    volumes:
      - ${SOLUX_CONFIG_MOUNT:-solux_config}:/home/solux/.config/solux
      - ${SOLUX_DATA_MOUNT:-solux_data}:/home/solux/.local/share/solux
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
  solux_config:
  solux_data:
