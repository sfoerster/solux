services:
  ollama:
    image: ollama/ollama:0.12.0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  server:
    build: .
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ${SOLUS_CONFIG_MOUNT:-solus_config}:/home/solus/.config/solus
      - ${SOLUS_DATA_MOUNT:-solus_data}:/home/solus/.local/share/solus
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  worker:
    build: .
    command: ["solus", "worker", "start", "--_run-loop", "--workers", "2"]
    volumes:
      - ${SOLUS_CONFIG_MOUNT:-solus_config}:/home/solus/.config/solus
      - ${SOLUS_DATA_MOUNT:-solus_data}:/home/solus/.local/share/solus
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
  solus_config:
  solus_data:
